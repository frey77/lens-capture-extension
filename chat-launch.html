<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>正在打开聊天页</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #fff;
      }

      body {
        display: grid;
        place-items: center;
      }

      .card {
        width: min(92vw, 520px);
        padding: 24px;
        border-radius: 20px;
        background: rgba(15, 23, 42, 0.92);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
        opacity: 0;
        transition: opacity .15s ease;
      }

      .card.show {
        opacity: 1;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: rgba(255, 255, 255, 0.8);
      }

      .tip {
        margin-top: 14px;
        color: #cbd5e1;
      }

      .error {
        margin-top: 14px;
        color: #fca5a5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 id="title">正在打开聊天页</h1>
      <p id="message">正在复制截图并准备跳转，请稍候…</p>
      <p class="tip">跳转后如果未自动带入图片，请直接按 Ctrl+V。</p>
      <p id="error" class="error" hidden></p>
    </div>
    <script src="chat-launch.js"></script>
  </body>
</html>
